<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="../css/shopFinances.css" rel="stylesheet"/>
    <title>Shop Finances | Fixit</title>
</head>
<body>

    <div id="NavBar">
        <div id="forprofile">
            <i class="fa-solid fa-circle-user" id="profile" style="cursor: pointer;"></i>
        </div>
        <div id="mainnavbar">
            <a href="home.html"><button class="button">Home</button></a>
            <a href="manageOrder.html"><button class="button">Manage Orders</button></a>
            <a href="shopFinances.html"><button class="button">Shop Finances</button></a>
        </div>
        <div id="formiscelanious">
            <i class="fa-solid fa-bell"></i>
            <i class="fa-solid fa-comment-dots"></i>
        </div>
    </div>

    <div id="sidebar">
        <div id="listsSidebar">
            <div id="SidebarProf">
                <i class="fa-regular fa-circle-user" style="font-size: 50px; color: #5bc0de;"></i>
                <h2>Shop</h2>
                <p>shop@Fixit.com</p>
            </div>
            <button class="Tabs"><i class="fa-solid fa-users"></i> <h1>Staff List</h1></button>
            <button class="Tabs"><i class="fa-solid fa-arrow-trend-up"></i> <h1>Performance</h1></button>
            <button class="Tabs"><i class="fa-solid fa-gear"></i> <h1>Settings</h1></button>
            <a href="index.html" style="text-decoration: none;">
                <button class="Tabs" id="Sign-Out"><h1>Sign-out</h1></button>
            </a>
        </div>
    </div>

    <div id="ContentArea">
        <h1>Shop Finances</h1>
        
        
        <div class="finance-cards">
            <div class="card"><h3>Total Revenue</h3><p> ₱12,450</p></div>
            <div class="card"><h3>Pending Payments</h3><p> ₱1,200</p></div>
            <div class="card"><h3>Monthly Profit</h3><p> ₱8,320</p></div>
        </div>

        <table class="OrderTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Mar 12, 2026</td><td>Engine Oil Purchase</td><td>Supplies</td><td style="color: #ff4d4d;">-$200</td><td>Completed</td></tr>
                <tr><td>Mar 11, 2026</td><td>Service: Engine Tune-up</td><td>Service</td><td style="color: #5bc0de;">+$450</td><td>Completed</td></tr>
            </tbody>
        </table>
    </div>

    <script src="../script.js"></script>
</body>
</html>
