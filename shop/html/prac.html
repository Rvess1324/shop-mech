<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../css/prac.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Shop Account | Fixit</title>
</head>
<body>

    <div id="NavBar">
        <div id="forprofile">
            <i class="fa-solid fa-circle-user"></i>
        </div>
        
        <div id="mainnavbar">
            <a href="LandingPage.html"><button class="button">Home</button></a>
            <a href="shops.html"><button class="button">Shops</button></a>
            <a href="Mechanics.html"><button class="button">Mechanics</button></a>
        </div>

        <div id="formiscelanious">
            <div class="header-group">
                <i class="fa-solid fa-bell"></i>
                
            </div>
            <div class="header-group">
                <i class="fa-solid fa-comment-dots"></i>
                
            </div>
        </div>
    </div>

    <div id="MainContentArea">
        <div id="Header">
            <h1>AutoFix Professional Shop</h1>
        </div>

        <div id="AccountContainer">
            <div id="AccountCard">
                <div id="ShopIntro">
                    <h2>Shop Overview</h2>
                    <a href="url">autofix_shop@gmail.com</a>
                </div>
                
                <div id="ShopOptions">
                    <div class="ShopTab">
                        <i class="fa-brands fa-sourcetree"></i>
                        <h1>  Manage Clients</h1>
                    </div>
                    <div class="ShopTab">
                        <i class="fa-solid fa-circle-question"></i>
                        <h1>  Service Inquiries</h1>
                    </div>
                    <div class="ShopTab">
                        <i class="fa-solid fa-gear"></i>
                        <h1>  Shop Settings</h1>
                    </div>
                </div>
            </div>

            <div id="PerformanceSection">
                <h1 id="PerfTitle">Shop Performance</h1>
                <div id="StatsGrid">
                    <div class="StatBox">
                        <h3>Active Bookings</h3>
                        <p>12 Pending Services</p>
                    </div>
                    <div class="StatBox">
                        <h3>Available Mechanics</h3>
                        <p>8 Staff Members On-Duty</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
