<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <title>Manage Orders | Fixit</title>
</head>
<body>

    <div id="NavBar">
        <div id="forprofile">
            <i class="fa-solid fa-circle-user" id="profile" style="cursor: pointer;"></i>
        </div>
        <div id="mainnavbar">
            <a href="home.html"><button class="button">Home</button></a>
            <a href="manageOrder.html"><button class="button">Manage Orders</button></a>
            <a href="shopFinances.html"><button class="button">Shop Finances</button></a>

            <i class="fa-solid fa-bell"></i>
            <i class="fa-solid fa-comment-dots"></i>
        </div>
    </div>

    <div id="sidebar">

                <i class="fa-regular fa-circle-user" style="font-size: 50px; color: #5bc0de;"></i>

                <p>shop@Fixit.com</p>
            </div>

            </button>

                <i class="fa-solid fa-gear"></i> <h1>Settings</h1>
            </button>

                     <h1>Sign-out</h1>
                </button>

        <table class="OrderTable">

                <tr>
                    <th>Order ID</th>

            <tbody>
                <tr><td>#FIX-5521</td><td>Juan Dela Cruz</td><td>Engine Tune-up</td><td class="status-pending">Pending</td><td><button class="update-btn">Update</button></td></tr>

                <tr><td>#FIX-5524</td><td>Juan Dela Cruz</td><td>Tire Rotation</td><td class="status-pending">Pending</td><td><button class="update-btn">Update</button></td></tr>
            </tbody>
        </table>
    </div>
